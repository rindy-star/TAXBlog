<!DOCTYPE html>
<html lang="ko">
  <head data-include="partials/head-common.html">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAXboard | 상세 글</title>
    <meta name="description" content="TAXboard 상세 글 페이지" />
    <script src="../js/include.js" defer></script>
  </head>
  <body data-page="blog">
    <div data-include="partials/nav.html"></div>

    <main class="blog-main">
      <section class="blog-hero">
        <div class="container">
          <h1>종합소득세 신고, 처음이라면 이렇게 시작하세요</h1>
          <p class="blog-date">2026.04.08</p>
        </div>
      </section>
      <!-- <div class="container section-divider" aria-hidden="true"></div> -->

      <section class="blog-list-section">
        <div class="container">
          <div class="post-hero-image">
            <img
              src="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=1600&q=80"
              alt="세무 서류를 검토하는 회의 장면"
            />
          </div>
          <article class="blog-content">
            <p>
              신고 대상 여부를 먼저 확인한 뒤, 소득과 경비를 분류하고 증빙자료를 정리하면
              신고 오류를 크게 줄일 수 있습니다.
            </p>
            <p>
              홈택스 입력 전에는 누락된 공제 항목(연금저축, 보험료, 교육비 등)을 점검하고,
              제출 후에는 접수증과 신고내역을 반드시 저장해 두는 것을 권장합니다.
            </p>
          </article>

          <div class="post-share-bar" aria-label="글 공유 및 목록">
            <div class="post-share-bar__line" aria-hidden="true"></div>
            <div class="post-share-bar__row">
              <a class="post-share-bar__back" href="blog.html">
                <span class="post-share-bar__back-icon" aria-hidden="true">
                  <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                  </svg>
                </span>
                목록으로
              </a>
              <div class="post-share-bar__actions">
                <button
                  type="button"
                  class="post-share-btn post-share-btn--copy"
                  id="copyPostLink"
                >
                  <span class="post-share-btn__icon" aria-hidden="true">
                    <svg
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <rect x="9" y="9" width="13" height="13" rx="2" />
                      <path
                        d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                      />
                    </svg>
                  </span>
                  <span class="post-share-btn__text">Copy link</span>
                </button>
                <a
                  class="post-share-icon-btn"
                  href="#"
                  data-share="twitter"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="Twitter에 공유"
                >
                  <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                    aria-hidden="true"
                  >
                    <path
                      d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"
                    />
                  </svg>
                </a>
                <a
                  class="post-share-icon-btn"
                  href="#"
                  data-share="facebook"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="Facebook에 공유"
                >
                  <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                    aria-hidden="true"
                  >
                    <path
                      d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"
                    />
                  </svg>
                </a>
                <a
                  class="post-share-icon-btn"
                  href="#"
                  data-share="linkedin"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="LinkedIn에 공유"
                >
                  <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                    aria-hidden="true"
                  >
                    <path
                      d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
                    />
                  </svg>
                </a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div data-include="partials/footer.html"></div>
    <script src="../js/script.js"></script>
  </body>
</html>
